name: Auto Model Selection

on:
  workflow_dispatch:
    inputs:
      dataset:
        description: "Built-in dataset name (iris, wine, breast_cancer, digits, diabetes, california_housing) or path to CSV"
        required: false
        default: "iris"
      target:
        description: "Target column name (CSV files only)"
        required: false
        default: "target"
      task:
        description: "Learning task: classification or regression"
        required: false
        default: "classification"
        type: choice
        options:
          - classification
          - regression
      cv:
        description: "Number of cross-validation folds"
        required: false
        default: "5"
      scoring:
        description: "sklearn scoring metric (e.g. accuracy, f1_macro, r2)"
        required: false
        default: "accuracy"
      seed:
        description: "Random seed for reproducibility"
        required: false
        default: "42"

jobs:
  auto-model-selection:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run auto model selection simulation
        run: |
          python auto_model_selection.py \
            --dataset "${{ github.event.inputs.dataset }}" \
            --target  "${{ github.event.inputs.target }}" \
            --task    "${{ github.event.inputs.task }}" \
            --cv      "${{ github.event.inputs.cv }}" \
            --scoring "${{ github.event.inputs.scoring }}" \
            --seed    "${{ github.event.inputs.seed }}" \
            --output  results.json

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-selection-results
          path: results.json
